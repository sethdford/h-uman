name: Run SeaClaw Tests
description: Execute the seaclaw_tests binary with optional ASan options

inputs:
  build-dir:
    description: Build directory containing seaclaw_tests
    default: build
  asan-options:
    description: ASAN_OPTIONS environment variable value
    default: ""

runs:
  using: composite
  steps:
    - name: Run tests
      shell: bash
      run: |
        if [ -n "${{ inputs.asan-options }}" ]; then
          ASAN_OPTIONS="${{ inputs.asan-options }}" ./${{ inputs.build-dir }}/seaclaw_tests
        else
          ./${{ inputs.build-dir }}/seaclaw_tests
        fi
