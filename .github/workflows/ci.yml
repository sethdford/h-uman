name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev libcurl4-openssl-dev libssl-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install sqlite curl openssl

      - name: Build
        run: |
          mkdir build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Debug
          cmake --build . -j$(nproc 2>/dev/null || sysctl -n hw.logicalcpu)

      - name: Test
        run: cd build && ./seaclaw_tests

      - name: MinSizeRel build
        run: |
          mkdir build-release && cd build-release
          cmake .. -DCMAKE_BUILD_TYPE=MinSizeRel
          cmake --build . -j$(nproc 2>/dev/null || sysctl -n hw.logicalcpu)
