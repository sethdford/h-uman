services:
  agent:
    build: .
    image: seaclaw:latest
    profiles: ["agent"]
    stdin_open: true
    tty: true
    env_file:
      - path: .env
        required: false
    volumes:
      - seaclaw-data:/root/.seaclaw
    restart: unless-stopped

  gateway:
    build: .
    image: seaclaw:latest
    profiles: ["gateway"]
    ports:
      - "3000:3000"
    env_file:
      - path: .env
        required: false
    volumes:
      - seaclaw-data:/root/.seaclaw
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  seaclaw-data:
