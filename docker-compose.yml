services:
  agent:
    build: .
    image: human:latest
    profiles: ["agent"]
    stdin_open: true
    tty: true
    env_file:
      - path: .env
        required: false
    volumes:
      - human-data:/human-data
    restart: unless-stopped

  gateway:
    build: .
    image: human:latest
    profiles: ["gateway"]
    ports:
      - "3000:3000"
    env_file:
      - path: .env
        required: false
    volumes:
      - human-data:/human-data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  human-data:
